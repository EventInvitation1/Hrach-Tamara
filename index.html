<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Հրաչ & Թամարա — Save the Date</title>
    
    <style>
        /* ---------------------------------------------------------------------
           0. CUSTOM HANDWRITING FONT LOADING
        --------------------------------------------------------------------- */
        @font-face {
            font-family: 'UR Dzeragir';
            src: url('Dzeragir-Handdrawn.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* ---------------------------------------------------------------------
           1. CORE RESETS & GLOBAL STYLES
        --------------------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #EAE7DC; 
            color: #4A443A;
            overflow: hidden; /* Kept hidden during active viewport layering animations */
        }

        body.lock-scroll {
            overflow: hidden;
            height: 100vh;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           2. STATE 1: INITIAL INTRO LAYER
        --------------------------------------------------------------------- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #EAE7DC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .instruction-text {
            position: absolute;
            top: 10vh; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'UR Dzeragir', cursive, sans-serif;
            font-size: 1.45rem; /* Adjusted smaller to cleanly fit standard mobile viewports in 1 line */
            font-weight: 500;
            color: #554F43;
            text-align: center;
            width: 95%;
            white-space: nowrap; /* Forces text to remain on a single line without wrapping */
            user-select: none;
            letter-spacing: 0.5px;
        }

        .envelope-closed-wrapper {
            cursor: pointer;
            width: 46%;
            max-width: 190px; /* Small delicate profile on mobile devices */
            -webkit-tap-highlight-color: transparent;
            animation: envelopeSlideIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .envelope-closed-wrapper img {
            width: 100%;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.06));
            transition: transform 0.2s ease;
        }

        .envelope-closed-wrapper:active img {
            transform: scale(0.97);
        }

        @keyframes envelopeSlideIn {
            0% {
                transform: translateY(10vh);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           3. STATE 2: THE "OPEN AND ZOOM" TRANSITION
        --------------------------------------------------------------------- */
        .stage-transition #intro-overlay {
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        #opened-envelope-container {
            position: absolute;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            width: 40%;
            max-width: 160px; /* Matches the delicate scale of the first envelope */
            display: none;
            justify-content: center;
            z-index: 2;
        }

        .stage-transition #opened-envelope-container {
            display: flex;
            animation: openAndZoom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        #opened-envelope-container img {
            width: 100%;
            filter: drop-shadow(0 6px 15px rgba(0, 0, 0, 0.04));
        }

        @keyframes openAndZoom {
            0% {
                transform: translateX(-50%) scale(0.6);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) scale(0.85);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           4. STATE 3: LAYERED CASCADING REVEAL (Relative Absolute Bounds)
        --------------------------------------------------------------------- */
        #main-invitation-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            display: block;
        }

        /* --- STEP A: Save the Date Asset --- */
        .save-the-date-card {
            position: absolute;
            top: 14vh;
            right: 6%;
            width: 52%;
            z-index: 3;
            opacity: 0;
        }
        .reveal-content .save-the-date-card {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.0s forwards;
        }

        /* --- STEP B: Continuous Rotating Vinyl Disc --- */
        .vinyl-accent-wrapper {
            position: absolute;
            top: 22vh;
            left: 6%;
            width: 40%;
            z-index: 3;
            opacity: 0;
        }
        .reveal-content .vinyl-accent-wrapper {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.5s forwards,
                       continuousRotation 12s linear 1.2s infinite;
        }

        /* --- STEP C: Vertical Polaroid Framework --- */
        .polaroid-vertical {
            position: absolute;
            top: 46vh;
            left: 8%;
            width: 46%;
            background: #ffffff;
            padding: 8px 8px 24px 8px; /* Bottom weighted Polaroid margin */
            box-shadow: 3px 6px 18px rgba(0, 0, 0, 0.1);
            transform: rotate(-5deg);
            z-index: 4;
            opacity: 0;
        }
        .reveal-content .polaroid-vertical {
            animation: cascadeInPolaroidLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.15) 1.0s forwards;
        }

        /* --- STEP D: Center Seal Sticker --- */
        .accent-sticker-wrapper {
            position: absolute;
            top: 42vh;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 22%;
            z-index: 6; /* Placed completely on top as graphic dead-center layout seal */
            opacity: 0;
        }
        .reveal-content .accent-sticker-wrapper {
            animation: stickerPop 0.6s cubic-bezier(0.34, 1.7, 0.64, 1) 1.5s forwards;
        }

        /* --- STEP D: Horizontal Polaroid Framework --- */
        .polaroid-horizontal {
            position: absolute;
            top: 50vh;
            right: 6%;
            width: 52%;
            background: #ffffff;
            padding: 8px 8px 20px 8px;
            box-shadow: -3px 6px 20px rgba(0, 0, 0, 0.1);
            transform: rotate(5deg);
            z-index: 5;
            opacity: 0;
        }
        .reveal-content .polaroid-horizontal {
            animation: cascadeInPolaroidRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.15) 1.5s forwards;
        }

        /* --- Global Keyframe Engines --- */
        @keyframes cascadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cascadeInPolaroidLeft {
            0% {
                opacity: 0;
                transform: translateY(40px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(-5deg);
            }
        }

        @keyframes cascadeInPolaroidRight {
            0% {
                opacity: 0;
                transform: translateY(40px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(5deg);
            }
        }

        @keyframes stickerPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.4);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes continuousRotation {
            0% { transform: translateZ(0) rotate(0deg); }
            100% { transform: translateZ(0) rotate(360deg); }
        }
    </style>
</head>
<body class="lock-scroll">

    <!-- STATE 1: INITIAL SCREEN -->
    <div id="intro-overlay">
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <div class="envelope-closed-wrapper" id="envelopeBtn" role="button" aria-label="Բացել հրավիրատոմսը">
            <img src="front.png" alt="Closed Envelope">
        </div>
    </div>

    <!-- STATE 2: OPEN & ZOOM CONTAINER -->
    <div id="opened-envelope-container">
        <img src="opened2.png" alt="Open Envelope">
    </div>

    <!-- STATE 3: INVITATION MAIN INNER CONTENT -->
    <main id="main-invitation-content">
        
        <!-- STEP A: Save the Date Asset (Overlapping right side of open envelope) -->
        <div class="save-the-date-card">
            <img src="Save-the-date.png" alt="Hrach & Tamara - Save the Date Invitation Details">
        </div>

        <!-- STEP B: Rotating Decorative Vinyl (Left side accent) -->
        <div class="vinyl-accent-wrapper">
            <img src="vinyl.png" alt="Rotating Decorative Vinyl">
        </div>

        <!-- STEP C: Vertical Photo (Polaroid style frame rotated left at bottom edge of vinyl) -->
        <div class="polaroid-vertical">
            <img src="vertical.jpeg" alt="Couple Moment Vertical">
        </div>

        <!-- STEP D: Center Seal Sticker (Dead center visual anchor) -->
        <div class="accent-sticker-wrapper">
            <img src="sticker.png" alt="Floral Initials Monogram">
        </div>
        
        <!-- STEP D: Horizontal Photo (Polaroid style frame rotated right below Save the Date area) -->
        <div class="polaroid-horizontal">
            <img src="horizontal.jpeg" alt="Hrach and Tamara Profile Picture">
        </div>

    </main>

    <!-- INTERACTION LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const body = document.body;

            envelopeBtn.addEventListener('click', () => {
                // Instantly transitions state panels and displays opened envelope
                body.classList.add('stage-transition');
                
                // Staggered cascade trigger after opened envelope animation settles
                setTimeout(() => {
                    body.classList.add('reveal-content');
                }, 400); 
            });
        });
    </script>
</body>
</html>
