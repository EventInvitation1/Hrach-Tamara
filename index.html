<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Հրաչ & Թամարա — Save the Date</title>
    
    <style>
        /* ---------------------------------------------------------------------
           0. FONTS & ROOT CSS VARIABLES
        --------------------------------------------------------------------- */
        @font-face {
            font-family: 'UR Dzeragir';
            src: url('Dzeragir-Handdrawn.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            /* Palette */
            --bg-color: #EAE7DC;
            --text-color: #554F43;
            
            /* Depth & Photorealistic Layering Shadows */
            --shadow-paper-layered: 0 12px 24px -6px rgba(0, 0, 0, 0.18), 0 4px 10px -2px rgba(0, 0, 0, 0.10);
            --shadow-vinyl: 0 8px 18px rgba(0, 0, 0, 0.28);
            --filter-drop-shadow: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.16));
            --filter-envelope-shadow: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.14));

            /* Rotations */
            --angle-polaroid-left: -6deg;
            --angle-polaroid-right: 4deg;
        }

        /* ---------------------------------------------------------------------
           1. CORE RESETS & FULL-SCREEN CENTERING
        --------------------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body.lock-scroll {
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           2. STATE 1: INITIAL INTRO OVERLAY
        --------------------------------------------------------------------- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .instruction-text {
            position: absolute;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'UR Dzeragir', cursive, sans-serif;
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--text-color);
            text-align: center;
            width: 90%;
            white-space: nowrap;
            user-select: none;
            letter-spacing: 0.3px;
        }

        .envelope-closed-wrapper {
            cursor: pointer;
            width: 45%;
            max-width: 140px;
            aspect-ratio: 5 / 3.6;
            -webkit-tap-highlight-color: transparent;
            animation: envelopeSlideIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .envelope-closed-wrapper img {
            filter: var(--filter-envelope-shadow);
            transition: transform 0.2s ease;
        }

        .envelope-closed-wrapper:active img {
            transform: scale(0.96);
        }

        @keyframes envelopeSlideIn {
            0% { transform: translateY(5vh); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .stage-transition #intro-overlay {
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           3. THE CANVAS (Fixed Aspect Ratio for Perfect Group Spacing)
        --------------------------------------------------------------------- */
        #composition-canvas {
            position: relative;
            width: 92vw;
            max-width: 400px;
            /* Taller aspect ratio ensures distinct vertical grouping */
            aspect-ratio: 3 / 5.2; 
            display: none;
        }

        .stage-transition #composition-canvas {
            display: block;
        }

        /* --- BACKGROUND: OPENED ENVELOPE (Group 1 - Top) --- */
        #opened-envelope-container {
            position: absolute;
            top: 2%; /* Anchored to top */
            left: 50%;
            width: 70%; /* Scaled down significantly */
            z-index: 1;
            transform: translateX(-50%) scale(0.8);
            opacity: 0;
            display: flex;
            justify-content: center;
        }

        .stage-transition #opened-envelope-container {
            animation: openAndZoom 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        #opened-envelope-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: var(--filter-envelope-shadow);
        }

        @keyframes openAndZoom {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* ---------------------------------------------------------------------
           4. TIGHT COLLAGE COMPOSITION (Percentage-Based Positioning)
        --------------------------------------------------------------------- */
        
        /* --- ASSET 1: SAVE THE DATE CARD (Group 2 - Middle) --- */
        .save-the-date-card {
            position: absolute;
            top: 28%; /* Distinct gap below envelope flap */
            right: 6%;
            width: 50%; /* Proportionately larger */
            aspect-ratio: 1 / 1.5;
            z-index: 3;
            opacity: 0;
            background: #ffffff;
            box-shadow: var(--shadow-paper-layered);
            border-radius: 2px;
            padding: 3px;
        }
        .reveal-content .save-the-date-card {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.1s forwards;
        }

        /* --- ASSET 2: ROTATING VINYL DISC (Group 2 - Middle) --- */
        .vinyl-accent-wrapper {
            position: absolute;
            top: 34%; /* Level with the main card content */
            left: 6%;
            width: 40%; /* Proportionately larger */
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            z-index: 2;
            opacity: 0;
            box-shadow: var(--shadow-vinyl);
            background: #111111;
            overflow: hidden;
        }
        
        .vinyl-accent-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .reveal-content .vinyl-accent-wrapper {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.3s forwards;
        }
        .reveal-content .vinyl-accent-wrapper img {
            animation: continuousRotation 16s linear 1.0s infinite;
        }

        /* --- ASSET 3: CENTRAL MONOGRAM OVAL STICKER (Group 2 - Middle) --- */
        .accent-sticker-wrapper {
            position: absolute;
            top: 50%; /* Centered between upper items and photos */
            left: 36%;
            width: 28%; /* Proportionately larger */
            aspect-ratio: 1 / 1.35;
            z-index: 20;
            opacity: 0;
            filter: var(--filter-drop-shadow);
        }
        .reveal-content .accent-sticker-wrapper {
            animation: stickerPop 0.6s cubic-bezier(0.34, 1.5, 0.64, 1) 0.9s forwards;
        }

        /* --- ASSET 4: LEFT POLAROID PHOTO (Group 3 - Bottom) --- */
        .polaroid-vertical {
            position: absolute;
            top: 64%; /* Pushed all the way down */
            left: 5%;
            width: 45%;
            aspect-ratio: 3 / 3.9;
            background: #ffffff;
            padding: 5px 5px 18px 5px;
            box-shadow: var(--shadow-paper-layered);
            transform: rotate(0deg); 
            z-index: 10;
            opacity: 0;
        }
        .reveal-content .polaroid-vertical {
            animation: cascadeInPolaroidLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 0.5s forwards;
        }

        /* --- ASSET 5: RIGHT POLAROID PHOTO (Group 3 - Bottom) --- */
        .polaroid-horizontal {
            position: absolute;
            top: 71%; /* Pushed all the way down to limit overlap */
            right: 4%;
            width: 52%;
            aspect-ratio: 4 / 3.2;
            background: #ffffff;
            padding: 5px 5px 14px 5px;
            box-shadow: var(--shadow-paper-layered);
            transform: rotate(0deg);
            z-index: 11;
            opacity: 0;
        }
        .reveal-content .polaroid-horizontal {
            animation: cascadeInPolaroidRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 0.7s forwards;
        }

        /* --- FLORAL ACCENTS --- */
        .flower-accent {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            filter: var(--filter-drop-shadow);
        }

        .card-flower {
            top: -12px;
            right: -12px;
            width: 35%;
            height: auto;
            z-index: 12;
        }

        .vinyl-flower {
            top: 59%; 
            left: 8%;
            width: 22%;
            height: auto;
            z-index: 15;
        }

        .reveal-content .flower-accent {
            animation: flowerPop 0.6s cubic-bezier(0.34, 1.5, 0.64, 1) 1.1s forwards;
        }

        /* ---------------------------------------------------------------------
           5. KEYFRAME ANIMATIONS
        --------------------------------------------------------------------- */
        @keyframes cascadeIn {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes cascadeInPolaroidLeft {
            0% { opacity: 0; transform: translateY(22px) rotate(0deg); }
            100% { opacity: 1; transform: translateY(0) rotate(var(--angle-polaroid-left)); }
        }

        @keyframes cascadeInPolaroidRight {
            0% { opacity: 0; transform: translateY(22px) rotate(0deg); }
            100% { opacity: 1; transform: translateY(0) rotate(var(--angle-polaroid-right)); }
        }

        @keyframes stickerPop {
            0% { opacity: 0; transform: scale(0.4); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes flowerPop {
            0% { opacity: 0; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes continuousRotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="lock-scroll">

    <!-- STATE 1: INITIAL INTRO OVERLAY -->
    <div id="intro-overlay">
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <div class="envelope-closed-wrapper" id="envelopeBtn" role="button" aria-label="Բացել հրավիրատոմսը">
            <img src="front.png" alt="Closed Envelope">
        </div>
    </div>

    <!-- MAIN CENTERING VIEWPORT STAGE: Fixed Proportions Canvas -->
    <div id="composition-canvas">

        <!-- STATE 2: OPENED ENVELOPE BACKDROP -->
        <div id="opened-envelope-container">
            <img src="opened2.png" alt="Open Envelope">
        </div>
            
        <!-- STEP 1: Save the Date Card -->
        <div class="save-the-date-card">
            <img src="Save-the-date.png" alt="Hrach & Tamara - Save the Date Details">
            <img src="flower.png" alt="Floral Accent Top Right" class="flower-accent card-flower">
        </div>

        <!-- STEP 2: Rotating Decorative Vinyl -->
        <div class="vinyl-accent-wrapper">
            <img src="vinyl.png" alt="Rotating Decorative Vinyl">
        </div>

        <!-- STEP 3: Vinyl Botanical Pin -->
        <img src="flower.png" alt="Floral Accent Vinyl Pin" class="flower-accent vinyl-flower">

        <!-- STEP 4: Vertical Photo (Left Polaroid) -->
        <div class="polaroid-vertical">
            <img src="vertical.jpeg" alt="Couple Moment Vertical">
        </div>

        <!-- STEP 5: Horizontal Photo (Right Polaroid) -->
        <div class="polaroid-horizontal">
            <img src="horizontal.jpeg" alt="Hrach and Tamara Profile Picture">
        </div>

        <!-- STEP 6: Central Oval Monogram Seal -->
        <div class="accent-sticker-wrapper">
            <img src="sticker.png" alt="Floral Initials Monogram Seal">
        </div>

    </div>

    <!-- INTERACTION LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const body = document.body;

            envelopeBtn.addEventListener('click', () => {
                body.classList.add('stage-transition');
                
                setTimeout(() => {
                    body.classList.add('reveal-content');
                }, 350); 
            });
        });
    </script>
</body>
</html>
