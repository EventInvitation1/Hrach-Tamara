<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Հրաչ & Թամարա — Save the Date</title>
    
    <style>
        /* ---------------------------------------------------------------------
           0. CUSTOM HANDWRITING FONT LOADING
        --------------------------------------------------------------------- */
        @font-face {
            font-family: 'UR Dzeragir';
            src: url('Dzeragir-Handdrawn.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* ---------------------------------------------------------------------
           1. CORE RESETS & GLOBAL STYLES
        --------------------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #EAE7DC; 
            color: #4A443A;
            overflow: hidden;
        }

        body.lock-scroll {
            overflow: hidden;
            height: 100vh;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           2. STATE 1: INITIAL INTRO LAYER
        --------------------------------------------------------------------- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #EAE7DC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .instruction-text {
            position: absolute;
            top: 12vh; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'UR Dzeragir', cursive, sans-serif;
            font-size: 1.5rem; 
            font-weight: 500;
            color: #554F43;
            text-align: center;
            width: 90%;
            white-space: nowrap; 
            user-select: none;
            letter-spacing: 0.5px;
        }

        .envelope-closed-wrapper {
            cursor: pointer;
            width: 45%;
            max-width: 180px;
            aspect-ratio: 5 / 3.5;
            -webkit-tap-highlight-color: transparent;
            animation: envelopeSlideIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .envelope-closed-wrapper img {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.06));
            transition: transform 0.2s ease;
        }

        .envelope-closed-wrapper:active img {
            transform: scale(0.96);
        }

        @keyframes envelopeSlideIn {
            0% {
                transform: translateY(8vh);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           3. STATE 2: THE "OPEN AND ZOOM" TRANSITION
        --------------------------------------------------------------------- */
        .stage-transition #intro-overlay {
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        #opened-envelope-container {
            position: absolute;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%) scale(1);
            width: 38%;
            max-width: 150px;
            aspect-ratio: 5 / 4.8;
            display: none;
            justify-content: center;
            z-index: 1;
        }

        .stage-transition #opened-envelope-container {
            display: flex;
            animation: openAndZoom 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
        }

        #opened-envelope-container img {
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.04));
        }

        @keyframes openAndZoom {
            0% {
                transform: translateX(-50%) scale(0.6);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           4. STATE 3: LAYERED CASCADING REVEAL (Proportional & Anchored)
        --------------------------------------------------------------------- */
        #main-invitation-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* --- STEP A: Save the Date Main Card --- */
        .save-the-date-card {
            position: absolute;
            top: 15vh;
            right: 8%;
            width: 54%;
            aspect-ratio: 4 / 5;
            z-index: 2;
            opacity: 0;
            background: #ffffff;
            box-shadow: 2px 8px 24px rgba(0, 0, 0, 0.04);
            border-radius: 2px;
            padding: 4px;
        }
        .reveal-content .save-the-date-card {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.0s forwards;
        }

        /* --- STEP B: Continuous Rotating Vinyl Disc --- */
        .vinyl-accent-wrapper {
            position: absolute;
            top: 24vh;
            left: 8%;
            width: 32%;
            aspect-ratio: 1 / 1; /* Protects pure circular structural alignment */
            border-radius: 50%;
            z-index: 2;
            opacity: 0;
            background: #2b2b2b; /* Fallback elegant dark disc color if asset breaks */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .reveal-content .vinyl-accent-wrapper {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.4s forwards,
                       continuousRotation 16s linear 1.1s infinite;
        }

        /* --- STEP C: Vertical Photo (Polaroid) --- */
        .polaroid-vertical {
            position: absolute;
            top: 48vh;
            left: 8%;
            width: 40%;
            aspect-ratio: 3 / 3.8; /* True physical vertical photo layout ratio */
            background: #ffffff;
            padding: 6px 6px 18px 6px; 
            box-shadow: 4px 10px 20px rgba(0, 0, 0, 0.07);
            z-index: 3;
            opacity: 0;
        }
        .reveal-content .polaroid-vertical {
            animation: cascadeInPolaroidLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 0.8s forwards;
        }

        /* --- STEP D: Horizontal Photo (Polaroid) --- */
        .polaroid-horizontal {
            position: absolute;
            top: 52vh;
            right: 8%;
            width: 46%;
            aspect-ratio: 4 / 3.6; /* Balanced widescreen display ratio */
            background: #ffffff;
            padding: 6px 6px 16px 6px;
            box-shadow: -4px 10px 22px rgba(0, 0, 0, 0.07);
            z-index: 4;
            opacity: 0;
        }
        .reveal-content .polaroid-horizontal {
            animation: cascadeInPolaroidRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 1.2s forwards;
        }

        /* --- STEP D: Center Seal Sticker (Delicate Fine Overlay) --- */
        .accent-sticker-wrapper {
            position: absolute;
            top: 44vh;
            left: 50%;
            width: 75px; /* Size optimized to accent, not aggressively bury details */
            aspect-ratio: 1 / 1;
            z-index: 5; 
            opacity: 0;
        }
        .reveal-content .accent-sticker-wrapper {
            animation: stickerPop 0.6s cubic-bezier(0.34, 1.5, 0.64, 1) 1.2s forwards;
        }

        /* --- Global Structural Keyframes --- */
        @keyframes cascadeIn {
            0% {
                opacity: 0;
                transform: translateY(25px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cascadeInPolaroidLeft {
            0% {
                opacity: 0;
                transform: translateY(35px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(-6deg);
            }
        }

        @keyframes cascadeInPolaroidRight {
            0% {
                opacity: 0;
                transform: translateY(35px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(5deg);
            }
        }

        @keyframes stickerPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes continuousRotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="lock-scroll">

    <!-- STATE 1: INITIAL SCREEN -->
    <div id="intro-overlay">
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <div class="envelope-closed-wrapper" id="envelopeBtn" role="button" aria-label="Բացել հրավիրատոմսը">
            <img src="front.png" alt="Closed Envelope">
        </div>
    </div>

    <!-- STATE 2: OPEN & ZOOM CONTAINER -->
    <div id="opened-envelope-container">
        <img src="opened2.png" alt="Open Envelope">
    </div>

    <!-- STATE 3: INVITATION MAIN INNER CONTENT -->
    <main id="main-invitation-content">
        
        <!-- STEP A: Save the Date Asset -->
        <div class="save-the-date-card">
            <img src="Save-the-date.png" alt="Hrach & Tamara - Save the Date Invitation Details">
        </div>

        <!-- STEP B: Rotating Decorative Vinyl -->
        <div class="vinyl-accent-wrapper">
            <img src="vinil.webp" alt="Rotating Decorative Vinyl">
        </div>

        <!-- STEP C: Vertical Photo (Polaroid Style) -->
        <div class="polaroid-vertical">
            <img src="vertical.jpeg" alt="Couple Moment Vertical">
        </div>
        
        <!-- STEP D: Horizontal Photo (Polaroid Style) -->
        <div class="polaroid-horizontal">
            <img src="horizontal.jpeg" alt="Hrach and Tamara Profile Picture">
        </div>

        <!-- STEP D: Center Seal Sticker (Fades over the intersection beautifully) -->
        <div class="accent-sticker-wrapper">
            <img src="sticker.png" alt="Floral Initials Monogram">
        </div>

    </main>

    <!-- INTERACTION LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const body = document.body;

            envelopeBtn.addEventListener('click', () => {
                body.classList.add('stage-transition');
                
                setTimeout(() => {
                    body.classList.add('reveal-content');
                }, 350); 
            });
        });
    </script>
</body>
</html>
