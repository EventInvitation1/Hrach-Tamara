<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Հրաչ & Թամարա — Save the Date</title>
    
    <style>
        /* ---------------------------------------------------------------------
           0. CUSTOM HANDWRITING FONT LOADING
        --------------------------------------------------------------------- */
        @font-face {
            font-family: 'UR Dzeragir';
            src: url('Dzeragir-Handdrawn.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* ---------------------------------------------------------------------
           1. CORE RESETS & GLOBAL STYLES
        --------------------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #EAE7DC; 
            color: #4A443A;
            overflow: hidden;
        }

        body.lock-scroll {
            overflow: hidden;
            height: 100vh;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           2. STATE 1: INITIAL INTRO LAYER
        --------------------------------------------------------------------- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #EAE7DC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .instruction-text {
            position: absolute;
            top: 10vh; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'UR Dzeragir', cursive, sans-serif;
            font-size: 1.4rem; 
            font-weight: 500;
            color: #554F43;
            text-align: center;
            width: 90%;
            white-space: nowrap; 
            user-select: none;
            letter-spacing: 0.5px;
        }

        .envelope-closed-wrapper {
            cursor: pointer;
            width: 48%;
            max-width: 190px;
            aspect-ratio: 5 / 3.6;
            -webkit-tap-highlight-color: transparent;
            animation: envelopeSlideIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .envelope-closed-wrapper img {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.08));
            transition: transform 0.2s ease;
        }

        .envelope-closed-wrapper:active img {
            transform: scale(0.96);
        }

        @keyframes envelopeSlideIn {
            0% {
                transform: translateY(8vh);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           3. STATE 2: THE "OPEN AND ZOOM" TRANSITION
        --------------------------------------------------------------------- */
        .stage-transition #intro-overlay {
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        /* Large Centered Background Envelope */
        #opened-envelope-container {
            position: absolute;
            top: 3vh;
            left: 50%;
            transform: translateX(-50%);
            width: 78%;
            max-width: 330px;
            display: none;
            justify-content: center;
            z-index: 1; /* Lowest z-index to act as structural backdrop */
        }

        .stage-transition #opened-envelope-container {
            display: flex;
            animation: openAndZoom 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        #opened-envelope-container img {
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.08));
        }

        @keyframes openAndZoom {
            0% {
                transform: translateX(-50%) scale(0.7);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           4. STATE 3: DESIRED REFERENCE MATCHING LAYOUT (State 2 Picture)
        --------------------------------------------------------------------- */
        #main-invitation-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* --- 1. SAVE THE DATE CARD (Right side, tucked into envelope) --- */
        .save-the-date-card {
            position: absolute;
            top: 26vh;
            right: 8%;
            width: 44%;
            aspect-ratio: 1 / 1.45;
            z-index: 2;
            opacity: 0;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            border-radius: 2px;
            padding: 3px;
        }
        .reveal-content .save-the-date-card {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.1s forwards;
        }

        /* --- 2. ROTATING VINYL DISC (Left side, under sticker, above left polaroid) --- */
        .vinyl-accent-wrapper {
            position: absolute;
            top: 25vh;
            left: 10%;
            width: 36%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        }
        .reveal-content .vinyl-accent-wrapper {
            animation: cascadeIn 0.7s cubic-bezier(0.215, 0.610, 0.355, 1) 0.3s forwards,
                       continuousRotation 16s linear 1.0s infinite;
        }

        /* --- 3. LEFT POLAROID PHOTO (Angled left, tucked under vinyl) --- */
        .polaroid-vertical {
            position: absolute;
            top: 45vh;
            left: 6%;
            width: 46%;
            aspect-ratio: 3 / 3.9;
            background: #ffffff;
            padding: 7px 7px 22px 7px; 
            box-shadow: 2px 10px 22px rgba(0, 0, 0, 0.14);
            transform: rotate(-5deg);
            z-index: 4;
            opacity: 0;
        }
        .reveal-content .polaroid-vertical {
            animation: cascadeInPolaroidLeft 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 0.6s forwards;
        }

        /* --- 4. RIGHT POLAROID PHOTO (Angled right, overlapping bottom left polaroid) --- */
        .polaroid-horizontal {
            position: absolute;
            top: 53vh;
            right: 6%;
            width: 50%;
            aspect-ratio: 4 / 3.2;
            background: #ffffff;
            padding: 7px 7px 18px 7px;
            box-shadow: -2px 10px 24px rgba(0, 0, 0, 0.15);
            transform: rotate(4deg);
            z-index: 5; /* Positioned above left polaroid corner */
            opacity: 0;
        }
        .reveal-content .polaroid-horizontal {
            animation: cascadeInPolaroidRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.12) 0.8s forwards;
        }

        /* --- 5. CENTRAL OVAL STICKER (Overlays vinyl, save-the-date, and top-left of left polaroid) --- */
        .accent-sticker-wrapper {
            position: absolute;
            top: 36vh;
            left: 35%;
            width: 27%;
            aspect-ratio: 1 / 1.35;
            z-index: 10; /* Highest priority layer seal */
            opacity: 0;
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.16));
        }
        .reveal-content .accent-sticker-wrapper {
            animation: stickerPop 0.6s cubic-bezier(0.34, 1.5, 0.64, 1) 1.0s forwards;
        }

        /* --- Global Structural Keyframes --- */
        @keyframes cascadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cascadeInPolaroidLeft {
            0% {
                opacity: 0;
                transform: translateY(30px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(-5deg);
            }
        }

        @keyframes cascadeInPolaroidRight {
            0% {
                opacity: 0;
                transform: translateY(30px) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(4deg);
            }
        }

        @keyframes stickerPop {
            0% {
                opacity: 0;
                transform: scale(0.4);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes continuousRotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="lock-scroll">

    <!-- STATE 1: INITIAL SCREEN -->
    <div id="intro-overlay">
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <div class="envelope-closed-wrapper" id="envelopeBtn" role="button" aria-label="Բացել հրավիրատոմսը">
            <img src="front.png" alt="Closed Envelope">
        </div>
    </div>

    <!-- STATE 2: OPEN & ZOOM CONTAINER -->
    <div id="opened-envelope-container">
        <img src="opened2.png" alt="Open Envelope">
    </div>

    <!-- STATE 3: INVITATION MAIN INNER CONTENT -->
    <main id="main-invitation-content">
        
        <!-- STEP 1: Save the Date Card -->
        <div class="save-the-date-card">
            <img src="Save-the-date.png" alt="Hrach & Tamara - Save the Date Details">
        </div>

        <!-- STEP 2: Rotating Decorative Vinyl -->
        <div class="vinyl-accent-wrapper">
            <img src="vinyl.png" alt="Rotating Decorative Vinyl">
        </div>

        <!-- STEP 3: Vertical Photo (Left Polaroid) -->
        <div class="polaroid-vertical">
            <img src="vertical.jpeg" alt="Couple Moment Vertical">
        </div>

        <!-- STEP 4: Horizontal Photo (Right Polaroid) -->
        <div class="polaroid-horizontal">
            <img src="horizontal.jpeg" alt="Hrach and Tamara Profile Picture">
        </div>

        <!-- STEP 5: Central Oval Monogram Seal -->
        <div class="accent-sticker-wrapper">
            <img src="sticker.png" alt="Floral Initials Monogram Seal">
        </div>

    </main>

    <!-- INTERACTION LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const body = document.body;

            envelopeBtn.addEventListener('click', () => {
                body.classList.add('stage-transition');
                
                setTimeout(() => {
                    body.classList.add('reveal-content');
                }, 350); 
            });
        });
    </script>
</body>
</html>
