<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Wedding Invitation</title>
    
    <!-- Include Google Font that supports ultra-thin light weights for Armenian characters -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:wght@100;200;300&display=swap" rel="stylesheet">

    <style>
        /* Base Setup & Mobile-first resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F4F1EA; 
            overflow: hidden; /* Disables scrollbars on the initial landing state */
        }

        /* -----------------------------------------
           LANDING SCREEN STYLING (The Intro Overlay)
        -------------------------------------------- */
        #landing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #F4F1EA; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Pushes text up and spaces out items gracefully */
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s ease; /* Smooth 1-second transition */
            padding: 80px 20px 40px 20px; /* Generous top padding to place text near the top bar */
        }

        /* 1. TEXT ADJUSTMENTS: High, delicate, ultra-thin, and ethereal */
        .instruction-text {
            font-family: 'Noto Serif Armenian', Georgia, serif;
            font-weight: 100; /* Ultra-light weight */
            font-style: italic; /* Mimics a delicate handwritten script */
            font-size: 1.5rem;
            color: #655E53;
            text-align: center;
            user-select: none;
            letter-spacing: 1.5px;
            opacity: 0.85;
            margin-bottom: auto; /* Pushes the layout beneath it downward, creating separation */
        }

        /* 2. ENVELOPE STYLING & ENTRY ANIMATION */
        .envelope-wrapper {
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 280px; 
            margin-bottom: auto; /* Centers the final resting position perfectly */
            
            /* Subtle, slow entry animation. Smoothly moves up and stops immediately. */
            animation: elegantSlideIn 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            -webkit-tap-highlight-color: transparent; 
        }

        .envelope-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.06));
            transition: transform 0.3s ease;
        }

        /* Subtle scale feedback when user clicks down */
        .envelope-wrapper:active .envelope-img {
            transform: scale(0.98);
        }

        /* -----------------------------------------
           ANIMATIONS & UTILITIES
        -------------------------------------------- */
        @keyframes elegantSlideIn {
            0% {
                /* Starts slightly below the absolute center */
                transform: translateY(40px);
                opacity: 0;
            }
            100% {
                /* Moves smoothly to its centered home position and locks in place statically */
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Class added via JavaScript to trigger the smooth fade out */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* -----------------------------------------
           MAIN INVITATION CONTENT STYLING
        -------------------------------------------- */
        #main-content {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: #4A443A;
        }

        .invitation-card {
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }

        .invitation-card h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- 1. LANDING SCREEN OVERLAY -->
    <div id="landing-screen">
        <!-- Elevated, thin calligraphic instruction text -->
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <!-- Interactive Envelope Element with static finish -->
        <div class="envelope-wrapper" id="envelopeBtn" role="button" aria-label="Open Invitation">
            <!-- Ensure this matches your exact file name (e.g., front.jpg) -->
            <img src="front.png" alt="Wedding Envelope" class="envelope-img">
        </div>
    </div>


    <!-- 2. MAIN INVITATION CONTENT (Revealed later) -->
    <main id="main-content">
        <div class="invitation-card">
            <h1>ՀՐԱՉ & ԹԱՄԱՐԱ</h1>
            <p>Welcome to our main wedding invitation content!</p>
        </div>
    </main>

    <!-- 3. INTERACTION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const landingScreen = document.getElementById('landing-screen');

            envelopeBtn.addEventListener('click', () => {
                // Smooth fade-out interaction on click
                landingScreen.classList.add('fade-out');
                
                // Restore regular scrolling flow once the intro screen disappears completely
                setTimeout(() => {
                    document.body.style.overflow = 'auto';
                    document.documentElement.style.overflow = 'auto';
                }, 1000);
            });
        });
    </script>
</body>
</html>
