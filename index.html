<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հրաչ & Թամարա — Save the Date</title>
    
    <style>
        /* ---------------------------------------------------------------------
           0. CUSTOM HANDWRITING FONT LOADING
        --------------------------------------------------------------------- */
        @font-face {
            font-family: 'UR Dzeragir';
            src: url('UR Dzeragir-Handdrawn.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* ---------------------------------------------------------------------
           1. CORE RESETS & GLOBAL STYLES
        --------------------------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #EAE7DC; 
            color: #4A443A;
            overflow-x: hidden;
        }

        body.lock-scroll {
            overflow: hidden;
            height: 100vh;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ---------------------------------------------------------------------
           2. STATE 1: INITIAL INTRO LAYER (Fixed Centering)
        --------------------------------------------------------------------- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #EAE7DC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Forces total absolute vertical center */
            z-index: 100;
            pointer-events: auto;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        /* Position text high up using absolute placement relative to viewport */
        .instruction-text {
            position: absolute;
            top: 70px; 
            left: 50%;
            transform: translateX(-50%);
            font-family: 'UR Dzeragir', cursive, sans-serif;
            font-size: 2.2rem;
            color: #554F43;
            text-align: center;
            width: 90%;
            user-select: none;
            letter-spacing: 0.5px;
            transition: opacity 0.4s ease;
        }

        /* Closed Envelope Container (Perfect Centering Base) */
        .envelope-closed-wrapper {
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            -webkit-tap-highlight-color: transparent;
            /* Smooth minimal entry slide up stopping perfectly at absolute center */
            animation: envelopeSlideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .envelope-closed-wrapper img {
            width: 100%;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.06));
            transition: transform 0.2s ease;
        }

        .envelope-closed-wrapper:active img {
            transform: scale(0.97);
        }

        @keyframes envelopeSlideIn {
            0% {
                transform: translateY(50px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           3. STATE 2: THE "OPEN AND ZOOM" TRANSITION (Fixed Visibility Bug)
        --------------------------------------------------------------------- */
        .stage-transition #intro-overlay {
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
        }

        /* Opened Envelope Layout Pinning */
        #opened-envelope-container {
            position: relative; /* Shifted to relative to align naturally above content layout */
            margin: 40px auto 0 auto;
            width: 100%;
            max-width: 320px;
            display: none; /* Keeps hidden initially to prevent phantom layers */
            justify-content: center;
            z-index: 90;
        }

        /* Explicit display and play triggers on step change */
        .stage-transition #opened-envelope-container {
            display: flex;
            animation: openAndZoom 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        #opened-envelope-container img {
            width: 100%;
            filter: drop-shadow(0 6px 15px rgba(0, 0, 0, 0.04));
        }

        @keyframes openAndZoom {
            0% {
                transform: translateY(40px) scale(0.85);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* ---------------------------------------------------------------------
           4. STATE 3: REVEALING THE CONTENT
        --------------------------------------------------------------------- */
        #main-invitation-content {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px; /* Reduced top padding since open envelope flows contextually now */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .reveal-content #main-invitation-content {
            opacity: 1;
            transform: translateY(0);
        }

        .content-card {
            width: 100%;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            padding: 10px;
        }

        .accent-sticker-wrapper {
            max-width: 70px;
            margin: 10px 0;
        }
    </style>
</head>
<body class="lock-scroll">

    <!-- STATE 1: INITIAL SCREEN -->
    <div id="intro-overlay">
        <h2 class="instruction-text">Սեղմեք՝ բացելու համար</h2>
        
        <div class="envelope-closed-wrapper" id="envelopeBtn" role="button" aria-label="Բացել հրավիրատոմսը">
            <img src="front.png" alt="Closed Envelope">
        </div>
    </div>

    <!-- STATE 2: OPEN & ZOOM CONTAINER -->
    <div id="opened-envelope-container">
        <img src="opened2.png" alt="Open Envelope">
    </div>

    <!-- STATE 3: INVITATION MAIN INNER CONTENT -->
    <main id="main-invitation-content">
        
        <!-- Sticker Graphic -->
        <div class="accent-sticker-wrapper">
            <img src="sticker.png" alt="Floral Initials Monogram">
        </div>

        <!-- Save the date Asset -->
        <div class="content-card">
            <img src="Save-the-date.png" alt="Hrach & Tamara - Save the Date Invitation Details">
        </div>

        <!-- Photo Asset -->
        <div class="content-card">
            <img src="horizontal.jpeg" alt="Hrach and Tamara Profile Picture">
        </div>

    </main>

    <!-- INTERACTION LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const envelopeBtn = document.getElementById('envelopeBtn');
            const body = document.body;

            envelopeBtn.addEventListener('click', () => {
                // Instantly transitions state panels 
                body.classList.add('stage-transition');
                
                // Triggers content appearance timeline
                setTimeout(() => {
                    body.classList.add('reveal-content');
                    body.classList.remove('lock-scroll');
                }, 700); 
            });
        });
    </script>
</body>
</html>
